version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: agentbay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agentbay
      POSTGRES_PASSWORD: agentbay
      POSTGRES_DB: agentbay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentbay"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: agentbay-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://agentbay:agentbay@postgres:5432/agentbay
      DEBUG: "false"
      CORS_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: agentbay-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-me-in-production
    depends_on:
      - api

volumes:
  postgres_data:
